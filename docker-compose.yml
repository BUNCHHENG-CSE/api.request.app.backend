version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowapi_postgres
    environment:
      POSTGRES_USER: flowapi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowapi

  redis:
    image: redis:7-alpine
    container_name: flowapi_redis
    ports:
      - "6379:6379"
    networks:
      - flowapi

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowapi_api
    environment:
      DATABASE_URL: host=postgres user=flowapi password=password dbname=flowapi port=5432 sslmode=disable
      REDIS_URL: redis:6379
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - flowapi
    command: /app/api

volumes:
  postgres_data:

networks:
  flowapi:
    driver: bridge
